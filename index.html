<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>OdiGyan PDF Viewer</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"><style>
body {
  margin: 0;
  background: #111;
  font-family: Arial;
}

/* Topbar */
.topbar {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: #1e1e1e;
  position: sticky;
  top: 0;
  z-index: 10;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  background: #00bcd4;
  font-weight: bold;
  cursor: pointer;
  border-radius: 5px;
}

/* Viewer */
#viewerContainer {
  height: calc(100vh - 60px);
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  text-align: center;
}

/* Pages */
.page {
  margin: 10px auto;
  display: block;
  background: white;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* Fake fullscreen */
body.fullscreen .topbar {
  display: none;
}

body.fullscreen #viewerContainer {
  height: 100vh;
}
</style></head><body><div class="topbar">
  <input id="pdfUrl" placeholder="Paste Worker PDF URL..." />
  <button onclick="loadPDF()">View</button>
  <button onclick="toggleFull()">⛶</button>
</div><div id="viewerContainer"></div><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script>
let pdfDoc = null;
const container = document.getElementById("viewerContainer");

// 🚀 Load PDF
function loadPDF() {
  let url = document.getElementById("pdfUrl").value.trim();
  if (!url) return alert("Enter PDF URL");

  container.innerHTML = "";

  pdfjsLib.getDocument(url).promise.then(pdf => {
    pdfDoc = pdf;

    for (let i = 1; i <= pdf.numPages; i++) {
      renderPage(i);
    }
  });
}

// 🔥 FIT TO SCREEN + SHARP RENDER
function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const containerWidth = container.clientWidth;

    const viewport = page.getViewport({ scale: 1 });

    // 🔥 Auto fit width
    let scale = containerWidth / viewport.width;

    // 🔥 Slight clarity boost
    scale = scale * window.devicePixelRatio;

    const scaledViewport = page.getViewport({ scale });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = scaledViewport.width;
    canvas.height = scaledViewport.height;

    canvas.style.width = containerWidth + "px";
    canvas.style.height = "auto";

    canvas.classList.add("page");

    container.appendChild(canvas);

    page.render({
      canvasContext: ctx,
      viewport: scaledViewport
    });
  });
}

// 🔳 Fake fullscreen (pinch works)
function toggleFull() {
  document.body.classList.toggle("fullscreen");
}

// 🚫 Disable right click
document.addEventListener("contextmenu", e => e.preventDefault());

// 🚫 Disable print
document.addEventListener("keydown", e => {
  if ((e.ctrlKey && e.key === "p") || e.key === "PrintScreen") {
    e.preventDefault();
  }
});
</script></body>
</html>
