<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure PDF Viewer</title><style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
  }

  .topbar {
    display: flex;
    gap: 10px;
    padding: 10px;
    background: #1e1e1e;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: none;
  }

  button {
    padding: 10px;
    border: none;
    background: #00bcd4;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
  }

  #viewerContainer {
    overflow: auto;
    height: calc(100vh - 60px);
    text-align: center;
  }

  canvas {
    margin: 10px auto;
    display: block;
    background: white;
  }
</style></head><body><div class="topbar">
  <input id="pdfUrl" placeholder="Paste Worker PDF URL..." />
  <button onclick="loadPDF()">View</button>
  <button onclick="zoomIn()">+</button>
  <button onclick="zoomOut()">-</button>
  <button onclick="goFullScreen()">⛶ Full</button>
</div><div id="viewerContainer"></div><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script>
let pdfDoc = null;
let scale = 1.2;

function loadPDF() {
  const url = document.getElementById("pdfUrl").value.trim();
  if (!url) return alert("Enter PDF URL");

  document.getElementById("viewerContainer").innerHTML = "";

  const loadingTask = pdfjsLib.getDocument(url);
  loadingTask.promise.then(pdf => {
    pdfDoc = pdf;
    for (let i = 1; i <= pdf.numPages; i++) {
      renderPage(i);
    }
  });
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {
    const viewport = page.getViewport({ scale: scale });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    document.getElementById("viewerContainer").appendChild(canvas);

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });
  });
}

function zoomIn() {
  scale += 0.2;
  reload();
}

function zoomOut() {
  scale -= 0.2;
  reload();
}

function reload() {
  if (!pdfDoc) return;
  document.getElementById("viewerContainer").innerHTML = "";
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    renderPage(i);
  }
}

// 🔥 Fullscreen function
function goFullScreen() {
  const elem = document.documentElement;

  if (!document.fullscreenElement) {
    elem.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// Disable right click
document.addEventListener("contextmenu", e => e.preventDefault());

// Disable print shortcut
document.addEventListener("keydown", function(e) {
  if ((e.ctrlKey && e.key === 'p') || e.key === "PrintScreen") {
    e.preventDefault();
    alert("Printing disabled");
  }
});
</script></body>
</html>
